<!DOCTYPE html>
<html>
<head>
    <title>Anime Reels - দেখে ডাউনলোড করুন</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial; background: #1a1a2e; color: white; margin: 0; padding: 20px; }
        h1 { text-align: center; }
        .search-box { text-align: center; margin: 20px; }
        input { padding: 10px; width: 300px; border-radius: 5px; border: none; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; max-width: 1400px; margin: auto; }
        .card { background: #16213e; border-radius: 10px; overflow: hidden; transition: 0.3s; }
        .card:hover { transform: scale(1.02); }
        video { width: 100%; height: 240px; background: black; }
        .info { padding: 12px; }
        .title { font-weight: bold; margin-bottom: 8px; word-break: break-word; }
        .download-btn { background: #0f3460; color: white; padding: 8px; text-align: center; border-radius: 5px; text-decoration: none; display: inline-block; width: 100%; margin-top: 5px; }
        .download-btn:hover { background: #e94560; }
        .no-result { text-align: center; font-size: 20px; margin-top: 50px; }
        .footer { text-align: center; margin-top: 40px; color: gray; }
    </style>
</head>
<body>
<h1>🎬 Anime Biggest Reels Bundle</h1>
<div class="search-box">
    <input type="text" id="searchInput" placeholder="🔍 ভিডিও খুঁজুন (যেমন: naruto, attack on titan)" onkeyup="filterVideos()">
</div>
<div class="video-grid" id="videoGrid">লোড হচ্ছে...</div>
<div class="footer">ভিডিও দেখুন → পছন্দ হলে ডাউনলোড ক্লিক করুন</div>

<script>
let allVideos = [];

fetch('videos.json')
    .then(response => response.json())
    .then(data => {
        allVideos = data;
        displayVideos(allVideos);
    })
    .catch(error => {
        document.getElementById('videoGrid').innerHTML = '<div class="no-result">❌ videos.json পাওয়া যায়নি। প্রথমে ভিডিওর লিংক যোগ করুন।</div>';
    });

function displayVideos(videos) {
    const grid = document.getElementById('videoGrid');
    if(videos.length === 0) {
        grid.innerHTML = '<div class="no-result">😞 কোনো ভিডিও মেলেনি</div>';
        return;
    }
    
    grid.innerHTML = videos.map(v => `
        <div class="card">
            <video controls preload="metadata" poster="${v.thumbnail || ''}">
                <source src="${v.download}" type="video/mp4">
                আপনার ব্রাউজার ভিডিও সাপোর্ট করে না।
            </video>
            <div class="info">
                <div class="title">📹 ${v.name}</div>
                <a href="${v.download}" class="download-btn" download>⬇️ ডাউনলোড করুন</a>
            </div>
        </div>
    `).join('');
}

function filterVideos() {
    const keyword = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allVideos.filter(v => v.name.toLowerCase().includes(keyword));
    displayVideos(filtered);
}
</script>
</body>
</html>
